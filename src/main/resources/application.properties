spring.application.name=restaurant_reviews
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

#SPRING SECURITY
security.token.secret=${JWT_SECRET}
security.token.access-expiration=900000
security.token.refresh-expiration=604800000

springdoc.api-docs.path=/api-docs

# --- Local file storage for photos ---
storage.local.base-dir=${UPLOAD_DIR}
storage.local.allowed-content-types=image/jpeg,image/png
storage.local.max-size-bytes=5242880

# Spring standard multipart settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=10MB